<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Thought-Net — three-layer thought graph</title>
<style>
  html, body { margin: 0; height: 100%; background: #0e1116; overflow: hidden; }
  #hud {
    position: fixed; top: 12px; left: 14px; z-index: 10;
    color: #c9d1d9; font: 12px/1.7 -apple-system, "Hiragino Sans", sans-serif;
    background: rgba(14,17,22,.72); padding: 10px 14px; border-radius: 8px;
    border: 1px solid #2d333b;
  }
  #hud b { color: #e6edf3; font-size: 13px; }
  .sw { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; }
  #panel {
    position: fixed; top: 12px; right: 14px; z-index: 10; width: 300px;
    max-height: calc(100vh - 24px); overflow-y: auto;
    color: #c9d1d9; font: 12px/1.6 -apple-system, "Hiragino Sans", sans-serif;
    background: rgba(14,17,22,.82); padding: 12px 14px; border-radius: 8px;
    border: 1px solid #2d333b; display: none;
  }
  #panel h2 { margin: 0 0 4px; font-size: 14px; color: #e6edf3; word-break: break-word; }
  #panel .meta { color: #8b949e; margin-bottom: 8px; }
  #panel .grp { margin-top: 8px; }
  #panel .grp b { color: #e6edf3; }
  #panel .n { display: block; padding: 1px 0 1px 10px; color: #adbac7;
              cursor: pointer; word-break: break-word; }
  #panel .n:hover { color: #58a6ff; }
  #panel .close { float: right; cursor: pointer; color: #8b949e; }
</style>
</head>
<body>
<div id="hud">
  <b>Thought-Net</b> <span id="gen"></span>
  <div id="meter" style="margin:4px 0 2px;font-size:12px"></div>
  <div id="legend"></div>
  <div id="controls" style="margin-top:2px"></div>
  <details style="margin-top:6px"><summary id="guide-title" style="cursor:pointer"></summary>
    <div id="guide" style="max-width:440px;padding-top:4px"></div>
  </details>
  <div id="thaw"></div>
</div>
<div id="panel"></div>
<div id="graph"></div>
<script src="3d-force-graph.min.js"></script>
<script>
const data = /*__GRAPH_DATA__*/;

// ---- i18n（デフォルト en・build.py が data.lang を出す）
const I18N = {
  en: {
    gen: y => `(generated ${y})`,
    legend: [['#ff7b72','🖥 live (open windows)'],['#e8a94e','thought layer'],
             ['#7ee8fa','frozen (>21d)'],['#8be9a8','influence radius (near→far)'],
             ['#5b8dbf','knowledge (unreached)']],
    controls: 'click = highlight neighbors / drag = rotate / wheel = zoom',
    guideTitle: '📖 How to read it (5 patterns)',
    guide: [
      ['Green clusters','one blob = converging, scattered islands = diverging. 3 diverging days = time to prune windows.'],
      ['Dark-blue continent',"knowledge your current thinking doesn't reach. The green/blue border is where the next connection tends to appear."],
      ['Thin thought nodes','a project with few edges is barely recorded — it lives only in your head (bus-factor warning).'],
      ['Frozen (cyan) near green','consider reopening. The 🌱 thaw candidates are this, computed.'],
      ['Where 🖥 live pins in','windows bundle to a central live hub. A bridge from the hub to a project = ongoing work; a window on the hub alone = unassigned (working dir outside any known project).'],
    ],
    mode: 'thinking mode', diverging: 'diverging', neutral: 'steady', converging: 'converging',
    meter: (d,n,c,u) => ` — ${n} projects in ${d}d / windows ${c} linked, ${u} unlinked`,
    thawScore: (s,d) => ` (score ${s}, last ${d})`,
    layer: {0:'knowledge',1:'thought',2:'live'},
    metaDeg: 'links', metaDist: 'influence dist', metaFrozen: '❄ frozen',
    connected: (t,l,th,k) => `${t} direct links — live ${l} / thought ${th} / knowledge ${k}`,
    isolated: 'no links (isolated node)', more: n => `  …${n} more`,
  },
  ja: {
    gen: y => `(${y} 生成)`,
    legend: [['#ff7b72','🖥ライブ（今開いてる窓）'],['#e8a94e','思考層'],
             ['#7ee8fa','凍結（>21日）'],['#8be9a8','影響半径（近→遠）'],
             ['#5b8dbf','知識層（未到達）']],
    controls: 'クリック=近傍ハイライト / ドラッグ=回転 / ホイール=ズーム',
    guideTitle: '📖 読み方（5つの型）',
    guide: [
      ['緑のまとまり','一塊なら収束期、飛び地だらけなら発散期。発散が3日続いたら窓の棚卸し合図'],
      ['暗い青の大陸','今の思考が届いてない知識。緑との境界線が「次につながる予感」の発生地帯'],
      ['垂直エッジの細い思考ノード','記録の薄い空中プロジェクト＝頭の中にしかない（bus factor 警報）'],
      ['水色（凍結）が緑の近く','解凍検討。🌱候補はここを機械化したもの'],
      ['🖥ライブが思考層のどこに刺さってるか','全窓は中央のライブハブに束ねて表示。ハブから台帳へ橋が伸びてれば継続作業、ハブだけに繋がる窓は未帰属＝新規発散'],
    ],
    mode: '🧭 思考モード', diverging: '発散', neutral: '標準', converging: '収束',
    meter: (d,n,c,u) => ` — 直近${d}日 ${n}案件 / 窓 ${c}接続・${u}未帰属`,
    thawScore: (s,d) => ` (score ${s}, 最終 ${d})`,
    layer: {0:'知識',1:'思考',2:'ライブ'},
    metaDeg: 'つながり', metaDist: '影響距離', metaFrozen: '❄ 凍結',
    connected: (t,l,th,k) => `直接つながる ${t} 件 — ライブ${l}/思考${th}/知識${k}`,
    isolated: 'つながりなし（孤立ノード）', more: n => `  …他 ${n} 件`,
  },
};
const L = I18N[data.lang] || I18N.en;

document.getElementById('gen').textContent = L.gen(data.generated);

// 凡例・操作説明・読み方ガイドを辞書から描画（全て textContent=XSS安全）
const legendEl = document.getElementById('legend');
L.legend.forEach(([c, label], i) => {
  const sw = document.createElement('span');
  sw.className = 'sw'; sw.style.background = c;
  if (i) sw.style.marginLeft = '10px';
  legendEl.append(sw, label);
});
document.getElementById('controls').textContent = L.controls;
document.getElementById('guide-title').textContent = L.guideTitle;
const guideEl = document.getElementById('guide');
L.guide.forEach(([head, body], i) => {
  const b = document.createElement('b'); b.textContent = head;
  guideEl.append(`${i + 1}. `, b, ': ' + body);
  guideEl.appendChild(document.createElement('br'));
});

// 思考モードメーター（textContent=XSS安全）
if (data.focus_meter) {
  const fm = data.focus_meter;
  const el = document.getElementById('meter');
  const col = fm.mode === 'diverging' ? '#e8a94e' : fm.mode === 'converging' ? '#8be9a8' : '#adbac7';
  const badge = document.createElement('b');
  badge.textContent = L[fm.mode]; badge.style.color = col;
  el.append(L.mode + ': ', badge,
    L.meter(data.recent_days, fm.recent_projects, fm.live_connected, fm.live_unconnected));
}

const Z = { 0: -90, 1: 90, 2: 170 };    // 知識層 / 思考層 / ライブ層
data.nodes.forEach(n => { n.fz = Z[n.layer]; });

const byId = Object.fromEntries(data.nodes.map(n => [n.id, n]));
const neighbors = {};
data.links.forEach(l => {
  (neighbors[l.source] = neighbors[l.source] || new Set()).add(l.target);
  (neighbors[l.target] = neighbors[l.target] || new Set()).add(l.source);
});

// 影響半径: dist(直近作業からのグラフ距離)で緑→青へ減光
const RADIUS_COLORS = ['#8be9a8', '#74c9a6', '#63a8b0', '#5b8dbf'];
const baseColor = n => {
  if (n.layer === 2) return '#ff7b72'; // ライブ=今開いてる窓
  if (n.layer === 1) return n.frozen ? '#7ee8fa' : '#e8a94e';
  if (typeof n.dist === 'number')
    return RADIUS_COLORS[Math.min(n.dist, RADIUS_COLORS.length - 1)];
  return '#39485c'; // 未到達=減光
};
let focus = null;
const color = n =>
  focus && n.id !== focus.id && !(neighbors[focus.id] || new Set()).has(n.id)
    ? '#2a2f36'
    : baseColor(n);

// 解凍候補パネル（build.py がスコア算出済み）。
// ラベルは vault 由来の未信頼文字列。innerHTML を使わず textContent で組む（XSS 防止）。
const thawEl = document.getElementById('thaw');
if (data.thaw && data.thaw.length) {
  const hr = document.createElement('hr');
  hr.style.cssText = 'border-color:#2d333b;margin:6px 0';
  thawEl.appendChild(hr);
  data.thaw.forEach(t => {
    const line = document.createElement('div');
    const b = document.createElement('b');
    b.textContent = t.project;                       // textContent = HTML 無効化
    line.append('🌱 ', b, L.thawScore(t.score, t.last_touch));
    const via = document.createElement('div');
    via.style.paddingLeft = '1em';
    via.textContent = '↳ ' + t.via.map(v => `${v.label} (d${v.dist})`).join(' / ');
    thawEl.append(line, via);
  });
}
const escHtml = s => String(s).replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---- 選択ノードの要約パネル（近傍を層別に集計。全て textContent=XSS安全）
const LAYER_NAME = L.layer;
const panelEl = document.getElementById('panel');
function showPanel(node) {
  panelEl.textContent = '';
  panelEl.style.display = 'block';
  const close = document.createElement('span');
  close.className = 'close'; close.textContent = '✕';
  close.onclick = () => { panelEl.style.display = 'none'; focus = null; g.refresh(); };
  panelEl.appendChild(close);

  const h = document.createElement('h2');
  h.textContent = node.label;
  panelEl.appendChild(h);

  const meta = document.createElement('div');
  meta.className = 'meta';
  const bits = [`${LAYER_NAME[node.layer] || '?'}`, `${L.metaDeg} ${node.degree}`];
  if (typeof node.dist === 'number') bits.push(`${L.metaDist} ${node.dist}`);
  if (node.frozen) bits.push(L.metaFrozen);
  if (node.status) bits.push(node.status);
  meta.textContent = bits.join(' ・ ');
  panelEl.appendChild(meta);

  // 近傍を層別に分類
  const nb = [...(neighbors[node.id] || [])].map(id => byId[id]).filter(Boolean);
  const groups = { 2: [], 1: [], 0: [] };
  nb.forEach(x => groups[x.layer].push(x));
  const total = nb.length;
  const head = document.createElement('div');
  head.className = 'meta';
  head.textContent = total
    ? L.connected(total, groups[2].length, groups[1].length, groups[0].length)
    : L.isolated;
  panelEl.appendChild(head);

  for (const layer of [2, 1, 0]) {
    const arr = groups[layer].sort((a, b) => b.degree - a.degree);
    if (!arr.length) continue;
    const grp = document.createElement('div');
    grp.className = 'grp';
    const title = document.createElement('b');
    title.textContent = `${LAYER_NAME[layer]} (${arr.length})`;
    grp.appendChild(title);
    arr.slice(0, 12).forEach(x => {
      const item = document.createElement('span');
      item.className = 'n';
      item.textContent = '・' + x.label;
      item.onclick = () => { focus = x; g.refresh(); showPanel(x);
                             g.cameraPosition(undefined, x, 600); };
      grp.appendChild(item);
    });
    if (arr.length > 12) {
      const more = document.createElement('span');
      more.className = 'meta'; more.textContent = L.more(arr.length - 12);
      grp.appendChild(more);
    }
    panelEl.appendChild(grp);
  }
}

const g = ForceGraph3D()(document.getElementById('graph'))
  .graphData(data)
  .backgroundColor('#0e1116')
  .nodeLabel(n => escHtml(n.label + (n.last_touch ? ' (' + n.last_touch + ')' : '')))
  .nodeColor(color)
  .nodeVal(n => Math.max(1, Math.min(n.degree, 30)) * (n.layer === 1 ? 2 : 1))
  .nodeOpacity(0.92)
  .linkColor(l => l.kind === 'live' ? '#ff7b72' : l.kind === 'live-hub' ? '#8f4f4a'
                : l.kind === 'vertical' ? '#d4a24e' : '#3b4654')
  .linkOpacity(0.35)
  .linkWidth(l => l.kind === 'live' ? 2.5 : l.kind === 'live-hub' ? 0.7
                : l.kind === 'vertical' ? 1.2 : 0.3)
  .onNodeClick(n => {
    if (focus && focus.id === n.id) { focus = null; panelEl.style.display = 'none'; }
    else { focus = n; showPanel(n); }
    g.refresh();
  })
  .onBackgroundClick(() => { focus = null; panelEl.style.display = 'none'; g.refresh(); });

g.d3Force('charge').strength(-45);
// 初期視点は斜め横から＝二層の重なりと垂直エッジが見える角度
g.cameraPosition({ x: 620, y: 180, z: 40 }, { x: 0, y: 0, z: 0 }, 0);
</script>
</body>
</html>
